<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Game... | Save and Load2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for the play page to ensure the game fits perfectly */
        .play-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .game-screen {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            /* This maintains a 16:9 ratio for the game area */
            aspect-ratio: 16 / 9; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .game-info-panel {
            margin-top: 25px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-title-area h1 {
            margin: 0;
            font-size: 2rem;
            color: white;
        }

        .category-pill {
            background: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .actions-area button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .actions-area button:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <h1 onclick="window.location.href='index.html'">GamerCentral</h1>
            <a href="index.html" style="color: #888; text-decoration: none;">← Back to Home</a>
        </nav>
    </header>

    <main class="play-container" id="game-player">
        <div style="text-align: center; padding: 100px;">
            <h2>Loading Game Data...</h2>
        </div>
    </main>

    <script src="script.js"></script>

    <script>
        // Small helper to add a Fullscreen button function later
        function toggleFullscreen() {
            const elem = document.querySelector("iframe");
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
